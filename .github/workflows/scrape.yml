name: Daily Grant Scraper

on:
  schedule:
    # 8pm UTC = 6am AEDT (UTC+10) every day
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🇦🇺 Starting Fundii daily scrape..."
          python scraper.py --enrich --max-enrich 15
          echo "✅ Scrape complete"

      - name: Trigger grant alert emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "📧 Triggering alert emails..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/send-grant-alerts" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Alert function response: $RESPONSE"

      - name: Upload scrape artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grants-data-${{ github.run_number }}
          path: |
            scraper/grants_data.json
            scraper/scraper.log
          retention-days: 7
