name: Daily Grant Scraper

on:
  schedule:
    # 8pm UTC = 6am AEDT (UTC+10) every day
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Allow manual runs from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run BeautifulSoup scraper (state portals)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🇦🇺 Starting Fundii daily scrape — state portals..."
          python scraper.py --enrich --max-enrich 20
          echo "✅ State scrape complete"

      - name: Run GrantConnect scraper (federal grants)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🏛️ Starting GrantConnect scrape (grants.gov.au)..."
          python grantconnect.py
          echo "✅ GrantConnect scrape complete"

      - name: Run state + territory + federal scrapers (NSW/VIC/WA/TAS/QLD/SA/ACT/NT/ARENA etc.)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🗺️ Starting state/territory scrapers..."
          python statescrapers.py
          echo "✅ State scrapers complete"

      - name: Run business.gov.au scraper (603 federal grants via Coveo API)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🏢 Starting business.gov.au scrape..."
          python businessgov.py
          echo "✅ business.gov.au scrape complete"

      - name: Run local council scrapers (top 30 councils — SmartyGrants + own pages)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🏛️ Starting local council scrapers..."
          python localcouncils.py
          echo "✅ Council scrapers complete"

      - name: Run agency & state program scrapers (Screen AU, ARC, Apprenticeships, Regional etc.)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🏢 Starting agency & state program scrapers..."
          python agencyscrapers.py
          echo "✅ Agency scrapers complete"

      - name: Run supplementary federal & industry scrapers (CSIRO, Austrade, Defence, MRFF etc.)
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🏭 Starting supplementary federal/industry scrapers..."
          python federalscrapers.py
          echo "✅ Supplementary scrapers complete"

      - name: Trigger grant alert emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "📧 Triggering alert emails..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/send-grant-alerts" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Alert function response: $RESPONSE"

      - name: Upload scrape artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grants-data-${{ github.run_number }}
          path: |
            scraper/grants_data.json
            scraper/grantconnect_data.json
            scraper/businessgov_data.json
            scraper/statescrapers_data.json
            scraper/federalscrapers_data.json
            scraper/localcouncils_data.json
            scraper/agencyscrapers_data.json
            scraper/scraper.log
          retention-days: 7
